name = "listen-online-together-api"
main = "src/index.ts"
compatibility_date = "2024-08-20"

[vars]
MUSIC_API_BASE = "https://music.gdstudio.xyz"

[[d1_databases]]
binding = "DB"
database_name = "lot-db"
database_id = "replace-with-real-id"

[[kv_namespaces]]
binding = "ROOM_META"
id = "replace-with-real-kv-id"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomSyncDO"

[[migrations]]
tag = "v1"
new_classes = ["RoomSyncDO"]
