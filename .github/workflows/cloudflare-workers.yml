name: Deploy Cloudflare Worker

on:
  push:
    branches: ["main"]
    paths:
      - "worker/**"
      - "frontend/**"
      - ".github/workflows/cloudflare-workers.yml"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Typecheck worker
        run: npm run -w worker typecheck

      - name: Build frontend assets
        run: npm run -w frontend build

      - name: Generate wrangler.ci.toml (auto ensure D1/KV)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python -u - <<'PY'
          import json
          import os
          import re
          import urllib.request

          wrangler_path = "worker/wrangler.toml"
          out_path = "worker/wrangler.ci.toml"
          text = open(wrangler_path, "r", encoding="utf-8").read()

          account_id = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          token = os.environ["CLOUDFLARE_API_TOKEN"]
          build_sha = os.environ.get("GITHUB_SHA", "")[:12]

          def api(method: str, url: str, payload=None):
              req = urllib.request.Request(url, method=method)
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("Content-Type", "application/json")
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              with urllib.request.urlopen(req, data=data) as resp:
                  body = resp.read().decode("utf-8")
              parsed = json.loads(body)
              if not parsed.get("success"):
                  raise RuntimeError(parsed)
              return parsed

          d1_name = re.search(r'(?m)^database_name\s*=\s*"([^"]+)"\s*$', text).group(1)

          kv_binding_block = re.search(r'(?ms)^\[\[kv_namespaces\]\].*?(?=^\[\[|\Z)', text)
          if not kv_binding_block:
              raise RuntimeError("Missing [[kv_namespaces]] in worker/wrangler.toml")
          kv_binding_text = kv_binding_block.group(0)
          kv_title = re.search(r'(?m)^binding\s*=\s*"([^"]+)"\s*$', kv_binding_text).group(1)

          kv_list = api("GET", f"https://api.cloudflare.com/client/v4/accounts/{account_id}/storage/kv/namespaces?per_page=100")
          kv_id = None
          for item in kv_list.get("result", []):
              if item.get("title") == kv_title:
                  kv_id = item.get("id")
                  break
          if not kv_id:
              created = api("POST", f"https://api.cloudflare.com/client/v4/accounts/{account_id}/storage/kv/namespaces", {"title": kv_title})
              kv_id = created["result"]["id"]

          d1_list = api("GET", f"https://api.cloudflare.com/client/v4/accounts/{account_id}/d1/database")
          d1_id = None
          for item in d1_list.get("result", []):
              if item.get("name") == d1_name:
                  d1_id = item.get("uuid") or item.get("id")
                  break
          if not d1_id:
              created = api("POST", f"https://api.cloudflare.com/client/v4/accounts/{account_id}/d1/database", {"name": d1_name})
              d1_id = created["result"].get("uuid") or created["result"].get("id")

          text2 = text
          text2 = re.sub(r'REPLACE_WITH_D1_DATABASE_ID|replace-with-real-id', d1_id, text2)
          text2 = re.sub(r'REPLACE_WITH_KV_NAMESPACE_ID|replace-with-real-kv-id', kv_id, text2)
          text2 = re.sub(r'(?ms)(\[\[d1_databases\]\].*?^\s*database_id\s*=\s*")[^"]*("\s*$)', rf'\g<1>{d1_id}\2', text2)
          text2 = re.sub(r'(?ms)(\[\[kv_namespaces\]\].*?^\s*id\s*=\s*")[^"]*("\s*$)', rf'\g<1>{kv_id}\2', text2)

          if build_sha:
              if re.search(r'(?m)^BUILD_SHA\s*=', text2):
                  text2 = re.sub(r'(?m)^BUILD_SHA\s*=\s*"[^"]*"\s*$', f'BUILD_SHA = "{build_sha}"', text2)
              elif '[vars]' in text2:
                  text2 = re.sub(r'(?m)^\[vars\]\s*$', f'[vars]\nBUILD_SHA = "{build_sha}"', text2)

          open(out_path, 'w', encoding='utf-8').write(text2)
          print(f"Prepared {out_path}")
          print(f"D1={d1_name} ({d1_id})")
          print(f"KV={kv_title} ({kv_id})")
          PY

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply DB --remote --config worker/wrangler.ci.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config worker/wrangler.ci.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
